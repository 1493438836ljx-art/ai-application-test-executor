spring.application.name=ai-application-test-executor
server.port=8081

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:8.218.55.180:9092}
spring.kafka.consumer.group-id=skill-executor-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.huawei.cloudopenlabs.*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all

# Skill Executor
skill-executor.kafka.request-topic=skill-execution-request
skill-executor.kafka.response-topic=skill-execution-response

# Logging
logging.level.com.huawei.cloudopenlabs=DEBUG
